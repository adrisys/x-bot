apiVersion: batch/v1
kind: CronJob
metadata:
  name: x-bot
  namespace: x-bot
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          containers:
            - name: x-bot
              image: adriannavarro/x-bot:latest
              imagePullPolicy: Always
              envFrom:
                - secretRef:
                    name: x-bot-secrets
                - configMapRef:
                    name: x-bot-config
              volumeMounts:
                - name: data
                  mountPath: /data
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: x-bot-data
          restartPolicy: OnFailure
